version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# E-Commerce API — local development / staging stack
#
# Services:
#   app     — FastAPI application (Uvicorn, 4 workers)
#   db      — PostgreSQL 16 with persistent volume
#   redis   — Redis 7 for caching & session reservation
#   nginx   — Reverse proxy with rate-limiting and SSL termination point
#
# Usage:
#   docker compose up --build          # start all services
#   docker compose up --build app      # rebuild only the API
#   docker compose logs -f app         # tail application logs
#   docker compose exec db psql -U postgres ecommerce
# ─────────────────────────────────────────────────────────────────────────────

x-app-env: &app-env
  APP_ENV: ${APP_ENV:-development}
  APP_NAME: "E-Commerce API"
  APP_VERSION: "1.0.0"
  DEBUG: ${DEBUG:-false}
  SECRET_KEY: ${SECRET_KEY:-change-me-in-production-at-least-32-chars}
  DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/ecommerce
  REDIS_URL: redis://redis:6379/0
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
  SENTRY_DSN: ${SENTRY_DSN:-}

services:
  # ── API Application ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: ecommerce-api:latest
    container_name: ecommerce_app
    environment:
      <<: *app-env
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - app_logs:/app/logs
    restart: unless-stopped
    networks:
      - internal
      - web
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: ecommerce_db
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # Enable trigram extension for full-text search
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"   # expose for local tooling (pgAdmin, etc.)
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 60 1
        --loglevel warning
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Nginx reverse proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ecommerce_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - web
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  app_logs:
    driver: local

networks:
  internal:
    driver: bridge
    internal: true   # DB + Redis not reachable from outside
  web:
    driver: bridge
