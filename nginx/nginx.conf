# ─────────────────────────────────────────────────────────────────────────────
# Nginx reverse proxy — E-Commerce API
#
# Features:
#   - Per-IP rate limiting (60 req/min general, 10 req/min auth)
#   - Gzip compression for JSON responses
#   - Security headers (OWASP recommendations)
#   - Upstream keep-alive connections
#   - Dedicated Stripe webhook location (no rate limit)
#   - Custom JSON error pages
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format  json_combined  escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_time":"$upstream_response_time",'
            '"user_agent":"$http_user_agent"'
        '}';

    access_log  /var/log/nginx/access.log  json_combined;

    # ── Performance ────────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 20M;
    server_tokens       off;

    # ── Gzip ───────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss text/javascript
                      application/vnd.api+json;
    gzip_min_length   1024;

    # ── Rate limiting zones ────────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr  zone=api_limit:10m   rate=60r/m;
    limit_req_zone  $binary_remote_addr  zone=auth_limit:10m  rate=10r/m;
    limit_req_status 429;

    # ── Upstream ───────────────────────────────────────────────────────────────
    upstream api_backend {
        server    app:8000;
        keepalive 32;
    }

    # ── Main server ────────────────────────────────────────────────────────────
    server {
        listen  80;
        listen  [::]:80;
        server_name  localhost _;

        # Security headers
        add_header  X-Frame-Options          "SAMEORIGIN"                      always;
        add_header  X-Content-Type-Options   "nosniff"                         always;
        add_header  X-XSS-Protection         "1; mode=block"                   always;
        add_header  Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header  Permissions-Policy       "geolocation=(), microphone=()"   always;

        # ── Health check — no rate limit ──────────────────────────────────────
        location = /health {
            proxy_pass       http://api_backend/health;
            proxy_set_header Host $host;
            access_log       off;
        }

        # ── Stripe webhooks — no rate limit, pass raw body intact ─────────────
        location = /api/v1/webhooks/stripe {
            client_max_body_size  1M;
            proxy_pass            http://api_backend;
            proxy_http_version    1.1;
            proxy_set_header      Connection        "";
            proxy_set_header      Host              $host;
            proxy_set_header      X-Real-IP         $remote_addr;
            proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header      X-Forwarded-Proto $scheme;
            proxy_read_timeout    30s;
        }

        # ── Auth endpoints — stricter rate limiting ───────────────────────────
        location ~ ^/api/v1/auth/ {
            limit_req         zone=auth_limit  burst=5  nodelay;
            proxy_pass        http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header  Connection        "";
            proxy_set_header  Host              $host;
            proxy_set_header  X-Real-IP         $remote_addr;
            proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
        }

        # ── API routes ────────────────────────────────────────────────────────
        location /api/ {
            limit_req         zone=api_limit  burst=20  nodelay;

            proxy_pass        http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header  Connection        "";
            proxy_set_header  Host              $host;
            proxy_set_header  X-Real-IP         $remote_addr;
            proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;

            proxy_connect_timeout  5s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            proxy_buffering         on;
            proxy_buffer_size       8k;
            proxy_buffers           8 32k;
            proxy_busy_buffers_size 64k;
        }

        # ── OpenAPI docs ───────────────────────────────────────────────────────
        location ~ ^/(docs|redoc|openapi\.json)$ {
            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
        }

        # ── Root fallthrough ───────────────────────────────────────────────────
        location / {
            proxy_pass        http://api_backend;
            proxy_set_header  Host              $host;
            proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
        }

        # ── Custom error pages ─────────────────────────────────────────────────
        error_page 429 /429.json;
        location = /429.json {
            default_type application/json;
            return 429 '{"detail":"Too many requests — please slow down.","retry_after":60}';
        }

        error_page 502 503 504 /50x.json;
        location = /50x.json {
            default_type application/json;
            return 502 '{"detail":"Service temporarily unavailable. Please try again shortly."}';
        }
    }

    # ── TLS / HTTPS template (enable in production) ───────────────────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate      /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key  /etc/nginx/certs/privkey.pem;
    #     ssl_protocols        TLSv1.2 TLSv1.3;
    #     ssl_prefer_server_ciphers on;
    #     ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    #     ssl_session_cache    shared:SSL:10m;
    #     ssl_session_timeout  10m;
    #
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #     ... (same location blocks as HTTP server above)
    # }
}
